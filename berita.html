<!doctype html>
<html lang="id">
  <head>
    <base href="/website-sekolah/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="Berita dan informasi terbaru SD Cahaya Harapan Bekasi."
    >
    <title>Berita - SD Cahaya Harapan Bekasi</title>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = { darkMode: "class", theme: { extend: { fontFamily: { sans: ["Poppins", "ui-sans-serif", "system-ui", "sans-serif"] }, colors: { school: { navy: "#0D0B61", blue: "#294669", teal: "#478B8D", gold: "#E4D329" } } } } };
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-white font-sans text-slate-700 antialiased">
    <div id="navbar"></div>

    <main class="overflow-hidden">
      <section class="news-modern news-section bg-white px-4 pb-16 pt-28 sm:px-6 lg:pb-24">
        <div class="news-heading mx-auto mb-12 max-w-3xl text-center">
          <span class="inline-flex rounded-full bg-blue-50 px-4 py-2 text-xs font-extrabold uppercase tracking-[0.22em] text-blue-700">BERITA</span>
          <h2 class="mt-5 text-3xl font-black tracking-tight text-slate-950 sm:text-5xl">
            Kegiatan dan Informasi Terbaru Sekolah
          </h2>
        </div>

        <div class="news-section mx-auto max-w-7xl">
          <div class="section-title mb-6">
            <span></span>
            <h3 class="text-2xl font-black tracking-tight text-slate-950">Berita Terbaru</h3>
          </div>

          <div class="news-grid latest-news grid gap-6 md:grid-cols-2 xl:grid-cols-4"></div>
        </div>

        <div class="news-section more-news-section mx-auto mt-16 max-w-7xl">
          <div class="section-title mb-6">
            <span></span>
            <h3 class="text-2xl font-black tracking-tight text-slate-950">Berita Lainnya</h3>
          </div>

          <div class="news-grid more-news grid gap-6 md:grid-cols-2 xl:grid-cols-4"></div>
        </div>
      </section>
    </main>

    <div id="footer"></div>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/seo.js"></script>
    <script src="assets/js/maintenance.js"></script>
    <script src="assets/js/cms-connector.js"></script>
  </body>
</html>
