<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Sekolah - SD Cahaya Harapan</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="galeri-page">
    
    <div id="navbar"></div>

    <section class="simple-gallery-section gallery-section" id="galeri">
        <div class="container">
            
            <div class="simple-gallery-header">
                <h2>Galeri Sekolah</h2>
                <p>Dokumentasi kegiatan dan fasilitas di lingkungan SD Cahaya Harapan.</p>
            </div>

            <div class="gallery-filters" data-gallery-filters>
                <button class="filter-btn active" type="button" data-filter="semua" aria-pressed="true">Semua</button>
                <button class="filter-btn" type="button" data-filter="fasilitas" aria-pressed="false">Fasilitas</button>
                <button class="filter-btn" type="button" data-filter="kegiatan" aria-pressed="false">Kegiatan</button>
                <button class="filter-btn" type="button" data-filter="prestasi" aria-pressed="false">Prestasi</button>
            </div>

            <div class="simple-gallery-grid">
                <figure class="simple-gallery-card" data-gallery-item data-category="fasilitas">
                    <img src="assets/img/sekolah.jpg" alt="Gedung sekolah SD Cahaya Harapan">
                    <figcaption>Gedung Sekolah</figcaption>
                </figure>

                <figure class="simple-gallery-card" data-gallery-item data-category="kegiatan">
                    <img src="assets/img/sekolah2.JPG" alt="Kegiatan siswa di lingkungan sekolah">
                    <figcaption>Kegiatan Siswa</figcaption>
                </figure>

                <figure class="simple-gallery-card" data-gallery-item data-category="kegiatan">
                    <img src="assets/img/sekolah3.jpg" alt="Aktivitas belajar siswa">
                    <figcaption>Aktivitas Belajar</figcaption>
                </figure>

                <figure class="simple-gallery-card" data-gallery-item data-category="fasilitas">
                    <img src="assets/img/sekolah4.jpeg" alt="Fasilitas sekolah">
                    <figcaption>Lingkungan Sekolah</figcaption>
                </figure>

                <figure class="simple-gallery-card" data-gallery-item data-category="prestasi">
                    <img src="assets/img/instagram/siaga.png" alt="Dokumentasi kegiatan siaga">
                    <figcaption>Permainan Besar Siaga</figcaption>
                </figure>

                <figure class="simple-gallery-card" data-gallery-item data-category="kegiatan">
                    <img src="assets/img/instagram/senam.png" alt="Senam sehat bersama">
                    <figcaption>Senam Sehat Bersama</figcaption>
                </figure>
            </div>

        </div>
    </section>

    <div id="footer"></div>
    <script type="module" src="assets/js/main.js"></script>
    <script src="assets/js/seo.js"></script>
    <script src="assets/js/maintenance.js"></script>
    <script src="assets/js/cms-connector.js"></script>

</body>
</html>
